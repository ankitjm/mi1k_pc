  - id: "regression-test-checklist"
    title: "KHO-213 Regression Test Checklist"
    category: "test-plan"
    status: "in_progress"
    content: |
      ## Auth & Session Management
      - [ ] Login with valid store code (ROS-20260225-0001)
      - [ ] Login with invalid store code shows error
      - [ ] Mobile OTP login flow works
      - [ ] Session persists on page refresh
      - [ ] Logout clears session and redirects to login
      - [ ] Can't access /app without auth (redirect to login)
      
      ## Dashboard & Core Features
      - [ ] Dashboard loads and displays correct data
      - [ ] User name/store displayed correctly
      - [ ] Sales list visible, shows recent sales
      - [ ] Sales pagination works
      - [ ] New sale creation form accessible
      - [ ] New sale submit and validate (required fields)
      - [ ] Sales detail view shows all fields
      - [ ] Customer list accessible
      - [ ] Customer detail view shows profile
      - [ ] Inventory list shows products
      - [ ] Product detail view accessible
      - [ ] Reports/analytics charts render
      
      ## Schemes (BLOCKED BY KHO-214)
      - [ ] Schemes list loads without 502 error
      - [ ] Can view scheme details
      - [ ] Can create new scheme
      - [ ] Can edit existing scheme
      - [ ] Can delete scheme
      
      ## Onboarding Flow
      - [ ] Retailer registration form visible
      - [ ] Form validation works (required fields)
      - [ ] Mobile number format validation
      - [ ] Duplicate mobile number rejected
      - [ ] Store name/details captured
      - [ ] Form submit accepted
      - [ ] Confirmation message shown
      - [ ] Admin approval list accessible
      - [ ] Can approve/reject registrations
      - [ ] Approved retailers receive store code
      
      ## Visual & UX
      - [ ] Dark mode toggle works (if available)
      - [ ] Dark mode applies to all pages
      - [ ] Mobile viewport test (375px width)
      - [ ] No text overflow or truncation
      - [ ] No broken layouts
      - [ ] Empty states display correctly (no sales, no schemes, etc)
      - [ ] Loading states show while data fetches
      - [ ] Buttons/forms properly spaced and clickable
      - [ ] Navigation menu works on mobile
      - [ ] Sidebar accessible and functional
      
      ## Cross-browser Testing
      - [ ] Chrome (latest) — all tests pass
      - [ ] Safari (if available) — all tests pass
      - [ ] Mobile browser (iOS Safari or Chrome mobile) — responsive
      
      ## Security Verification
      - [ ] Auth tokens in secure cookies (httpOnly)
      - [ ] No sensitive data in localStorage
      - [ ] API requests include auth token
      - [ ] Invalid tokens rejected
      - [ ] CSRF tokens on forms
      - [ ] CSP headers enforced (when KHO-215 deployed)
      - [ ] No console errors or warnings
