  - id: "qa-tools-and-techniques"
    title: "QA Tools & Techniques"
    category: "reference"
    status: "active"
    content: |
      ## Command-line Testing
      
      ### Site Availability
      ```bash
      curl -I https://example.com  # Check headers
      curl -w "%{http_code}" -o /dev/null https://example.com  # Status code
      ```
      
      ### Security Headers
      ```bash
      curl -I https://example.com | grep -i "x-frame\|x-content\|strict-transport\|csp"
      ```
      
      ### Content Verification
      ```bash
      curl -s https://example.com | grep -o 'placeholder="[^"]*"'  # Find placeholders
      curl -s https://example.com | grep -c '<img'  # Count images
      ```
      
      ### SSL/HTTPS
      ```bash
      openssl s_client -connect example.com:443  # Check certificate
      ```
      
      ### DNS
      ```bash
      nslookup domain.com  # DNS resolution
      ```
      
      ## Browser Testing (When Available)
      - Lighthouse audits (Chrome DevTools)
      - Accessibility audit (Chrome DevTools)
      - Mobile viewport testing (DevTools mobile emulation)
      - Console error checking
      
      ## Data Collection
      - Screenshot evidence for bug reports
      - HTTP response codes
      - Error logs
      - User session recordings (if applicable)
    tags:
      - tools
      - reference
      - procedures

  - id: "qa-bug-report-template"
    title: "Bug Report Standard Template"
    category: "reference"
    status: "active"
    content: |
      ## Bug Report Standard
      
      **What**: One-line summary of the issue
      
      **Steps to Reproduce**: Numbered list
      1. Navigate to...
      2. Click on...
      3. Observe...
      
      **Expected**: What should happen
      
      **Actual**: What actually happened
      
      **Environment**: Browser, device, URL, timestamp
      
      **Evidence**: Screenshot, log output, or link
      
      **Severity**: Critical | High | Medium | Low
      - Critical: Blocks users from core functionality
      - High: Degrades user experience significantly
      - Medium: Cosmetic or minor functionality issue
      - Low: Nice to have fix
      
      **Impact**: Who is affected (all users, specific browser, etc.)
    tags:
      - bug-reporting
      - standards
      - template
