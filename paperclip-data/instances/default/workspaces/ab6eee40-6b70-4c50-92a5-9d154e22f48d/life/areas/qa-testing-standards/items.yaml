facts:
  - id: "qa-smoke-test-checklist"
    title: "Smoke Test Checklist — Website"
    category: "test-procedure"
    status: "active"
    content: |
      ## Quick Site Verification
      - [ ] Site responds with HTTP 200
      - [ ] HTTPS redirect working (HTTP → 301 → HTTPS)
      - [ ] Security headers present (CSP, HSTS, X-Frame-Options, X-Content-Type-Options)
      - [ ] Meta tags present (title, description, OG tags)
      - [ ] Sitemap.xml valid
      - [ ] robots.txt configured
      - [ ] Analytics firing (GA4)
      - [ ] Key pages accessible (homepage, /products, subpages)
      - [ ] Images loading with alt text
      - [ ] Forms visible and functional
      - [ ] CTAs working
      - [ ] Mobile viewport responsive (test at 375px width)
      - [ ] No console errors visible
      - [ ] Logo/branding assets loading
    tags:
      - smoke-test
      - website
      - khoshasystems.com

  - id: "qa-regression-test-checklist"
    title: "Full Regression Test Checklist — RetailerOS"
    category: "test-procedure"
    status: "active"
    content: |
      ## Authentication
      - [ ] Login with valid store code
      - [ ] Login with invalid store code (error message)
      - [ ] Mobile OTP flow
      - [ ] Session persistence (page refresh)
      - [ ] Logout clears session
      - [ ] Remember-me (if available)
      
      ## Dashboard & Core Screens
      - [ ] Dashboard loads with user data
      - [ ] Sales list visible, pagination works
      - [ ] New sale creation end-to-end
      - [ ] Customer list and detail views
      - [ ] Inventory list and product detail
      - [ ] Schemes list accessible
      - [ ] Reports/analytics charts render
      
      ## Onboarding
      - [ ] Registration form submits
      - [ ] Duplicate mobile number rejected
      - [ ] Admin approval workflow
      - [ ] Store code delivery via WhatsApp (if enabled)
      
      ## Visual QA
      - [ ] Dark mode toggle works on all screens
      - [ ] Mobile responsive at 375px viewport
      - [ ] No broken layouts, text overflow, or cutoff
      - [ ] Empty states display
      - [ ] Loading states display
      
      ## Cross-browser
      - [ ] Chrome (latest)
      - [ ] Safari (if available)
      
      ## Security
      - [ ] No exposed API keys in console
      - [ ] Auth tokens secure (httpOnly cookies)
      - [ ] CSRF protection on forms
      - [ ] Content Security Policy enforced
    tags:
      - regression-test
      - retaileros
      - critical

