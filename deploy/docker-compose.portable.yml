###############################################################################
# MI1K Portable Stack — Self-contained deployment with bundled PostgreSQL
#
# Usage:
#   docker compose -f docker-compose.portable.yml up -d
#
# Requires:
#   - .env file in same directory (generated by mi1k-deploy.sh)
#   - mi1k-server:latest image (loaded from tarball or pulled from registry)
###############################################################################

services:

  # ── PostgreSQL Database ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mi1k-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mi1k
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mi1k
    volumes:
      - mi1k-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mi1k -d mi1k"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s
    # Not exposed to host — only accessible from other services in this stack
    expose:
      - "5432"

  # ── MI1K Application ───────────────────────────────────────────────────────
  mi1k:
    image: mi1k-server:latest
    container_name: mi1k
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${MI1K_PORT:-3100}:3100"
    environment:
      - DATABASE_URL=postgres://mi1k:${POSTGRES_PASSWORD}@postgres:5432/mi1k
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - PAPERCLIP_PUBLIC_URL=${PAPERCLIP_PUBLIC_URL}
      - PORT=3100
      - SERVE_UI=true
      - PAPERCLIP_DEPLOYMENT_MODE=authenticated
      - PAPERCLIP_DEPLOYMENT_EXPOSURE=private
      - PAPERCLIP_HOME=/paperclip
      - PAPERCLIP_MIGRATION_AUTO_APPLY=true
      - NODE_ENV=production
    volumes:
      - mi1k-data:/paperclip
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3100/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 45s

  # ── Caddy Reverse Proxy (optional — enable via profile) ────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: mi1k-caddy
    restart: unless-stopped
    profiles:
      - https
    depends_on:
      mi1k:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - MI1K_DOMAIN=${MI1K_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - mi1k-caddy-data:/data
      - mi1k-caddy-config:/config

volumes:
  mi1k-pgdata:
  mi1k-data:
  mi1k-caddy-data:
  mi1k-caddy-config:
